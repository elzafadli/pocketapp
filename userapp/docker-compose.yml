services:
  pakuningratan:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    networks:
      - pakuningratan-network

networks:
  pakuningratan-network:
    driver: bridge

